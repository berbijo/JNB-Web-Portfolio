<section id="projects" class="projects">

  <div class="projects__layout">

    <!-- ── LEFT / PROJECT LIST ───────────────── -->
    <div class="projects__list">

      <span class="projects__eyebrow section-title header">
        Projects & Design
      </span>

      @for (project of projects; track project.id) {

        <a
          class="projects__item"

          [class.active]="activeProject().id === project.id"

          (mouseenter)="selectProject(project)"

          routerLink="['/projects', project.id]"
        >

          <!-- LEFT -->
          <div class="projects__item-left">

            <span class="projects__name">
              {{ project.name }}
                <span class="projects__arrow">
                ↗
              </span>
            </span>

            <p class="projects__description">
              {{ project.description }}
            </p>

          </div>

        </a>

      }

    </div>

    <!-- ── RIGHT / PREVIEW ───────────────────── -->
    <div class="projects__preview">

      <div
        class="projects__preview-card"
        [class.active]="activeProject()"
      >

        <!-- IMAGE -->
        <img
          #previewImage

          class="projects__preview-image"

          [src]="activeProject().previewImage"

          [alt]="activeProject().name"
        />

        <!-- OVERLAY -->
        <div
          #previewOverlay
          class="projects__preview-overlay"
        >

          <span class="projects__preview-category">
            {{ activeProject().category }}
          </span>

          <h3 class="projects__preview-title">
            {{ activeProject().name }}
          </h3>

          <div class="projects__preview-tags">

            @for (
              tech of activeProject().techStack;
              track tech
            ) {

              <span class="tech-tag">
                {{ tech }}
              </span>

            }

          </div>

        </div>

      </div>

    </div>

  </div>

</section>
