<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">

  <title>Joshua N. Berbie</title>

  <base href="/">

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="icon" type="image/x-icon" href="assets/jnb_favicon.png">

  <script>
    (() => {

      const savedTheme =
        localStorage.getItem('theme');

      const theme =
        savedTheme || 'light';

      document.documentElement.setAttribute(
        'data-theme',
        theme
      );

    })();
  </script>

</head>

<body>
  <app-root></app-root>
</body>

</html>
